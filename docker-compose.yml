version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: orangenexus-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orangenexus}
      POSTGRES_USER: ${POSTGRES_USER:-orangenexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orangenexus}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orangenexus} -d ${POSTGRES_DB:-orangenexus}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: orangenexus-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    container_name: orangenexus-api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./apps/api:/app

  web:
    build:
      context: ./apps/web
    container_name: orangenexus-web
    depends_on:
      - api
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules

volumes:
  pgdata:
